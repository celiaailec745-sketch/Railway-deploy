<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes AI Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="glass-card max-w-2xl w-full p-8 rounded-2xl shadow-xl">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800">Diabetes AI Predictor</h1>
            <p class="text-slate-500 mt-2">Outil d'analyse prédictive basé sur les données cliniques</p>
        </div>

        <form id="prediction-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Grossesses</label>
                    <input type="number" id="Pregnancies" placeholder="Ex: 2" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Glucose (mg/dL)</label>
                    <input type="number" id="Glucose" placeholder="Ex: 120" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Pression Artérielle</label>
                    <input type="number" id="BloodPressure" placeholder="Ex: 80" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Épaisseur de peau (mm)</label>
                    <input type="number" id="SkinThickness" placeholder="Ex: 20" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Insuline (mu U/ml)</label>
                    <input type="number" id="Insulin" placeholder="Ex: 80" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">IMC (BMI)</label>
                    <input type="number" step="0.1" id="BMI" placeholder="Ex: 25.5" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Indice Pedigree (DPF)</label>
                    <input type="number" step="0.01" id="DiabetesPedigreeFunction" placeholder="Ex: 0.47" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Âge</label>
                    <input type="number" id="Age" placeholder="Ex: 33" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                </div>
            </div>

            <div class="md:col-span-2 mt-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform transition active:scale-95">
                    Lancer l'Analyse
                </button>
            </div>
        </form>

        <div id="result-container" class="hidden mt-8 p-4 rounded-xl text-center animate-fade-in">
            <span class="text-sm uppercase tracking-widest text-slate-500">Résultat de la prédiction</span>
            <h3 id="result" class="text-2xl font-bold mt-1"></h3>
        </div>
    </div>

    <script>
        document.getElementById("prediction-form").addEventListener("submit", async function(e) {
            e.preventDefault();

            const btn = e.target.querySelector('button');
            const resContainer = document.getElementById("result-container");
            const resText = document.getElementById("result");

            // Animation de chargement
            btn.innerText = "Calcul en cours...";
            btn.disabled = true;

            const data = {
                Pregnancies: Number(document.getElementById("Pregnancies").value),
                Glucose: Number(document.getElementById("Glucose").value),
                BloodPressure: Number(document.getElementById("BloodPressure").value),
                SkinThickness: Number(document.getElementById("SkinThickness").value),
                Insulin: Number(document.getElementById("Insulin").value),
                BMI: Number(document.getElementById("BMI").value),
                DiabetesPedigreeFunction: Number(document.getElementById("DiabetesPedigreeFunction").value),
                Age: Number(document.getElementById("Age").value)
            };

            try {
                const response = await fetch("/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                // Style dynamique du résultat (à adapter selon ce que renvoie ton API)
                resContainer.classList.remove('hidden', 'bg-red-100', 'bg-green-100', 'text-red-700', 'text-green-700');

                if (result.prediction === 1 || result.prediction === "Diabetic") {
                    resText.innerText = "Risque de Diabète Détecté";
                    resContainer.classList.add('bg-red-100', 'text-red-700');
                } else {
                    resText.innerText = "Aucun Risque Détecté";
                    resContainer.classList.add('bg-green-100', 'text-green-700');
                }
            } catch (error) {
                alert("Erreur lors de la connexion à l'API");
            } finally {
                btn.innerText = "Lancer l'Analyse";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
